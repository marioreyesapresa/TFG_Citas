<!-- Nota: Esta plantilla es independiente para asegurar el estilo Glassmorphism -->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Perfil - Hospital TFG</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }
        
        .glass-container {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            width: 100%;
            max-width: 500px;
            padding: 40px;
            color: white;
        }

        h2 { 
            text-align: center; 
            margin-bottom: 30px; 
            font-weight: 300;
            letter-spacing: 1px;
        }

        .form-group { margin-bottom: 25px; }

        label { 
            display: block; 
            margin-bottom: 8px; 
            font-size: 0.9em; 
            color: rgba(255, 255, 255, 0.8);
        }

        .input-styled {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            padding: 12px 15px;
            width: 100%;
            color: white;
            font-size: 1em;
            outline: none;
            transition: all 0.3s;
        }

        .input-styled:focus {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.5);
        }

        select.input-styled option {
            background: #764ba2;
            color: white;
        }

        .btn-save {
            background: #2ecc71;
            color: white;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 12px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
            margin-top: 10px;
        }

        .btn-save:hover {
            background: #27ae60;
            transform: translateY(-2px);
        }

        .btn-cancel {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-size: 0.9em;
            transition: color 0.3s;
        }

        .btn-cancel:hover { color: white; }

        /* Estilo para los campos de Django form */
        .django-form p { margin-bottom: 20px; }
        .django-form input, .django-form select {
            background: rgba(255, 255, 255, 0.15) !important;
            border: 1px solid rgba(255, 255, 255, 0.3) !important;
            color: white !important;
            padding: 12px !important;
            border-radius: 10px !important;
            width: 100% !important;
        }
    </style>
</head>
<body>

<div class="glass-container">
    <h2>👤 Ajustes de Perfil</h2>
    
    <form method="post" class="django-form">
        {% csrf_token %}
        
        {% for field in form %}
            <div class="form-group">
                <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                    <div style="color: #ff7675; font-size: 0.8em; margin-top: 5px;">
                        {{ field.errors }}
                    </div>
                {% endif %}
            </div>
        {% endfor %}

        <button type="submit" class="btn-save">Guardar Cambios</button>
        <a href="{% url 'perfil_paciente' %}" class="btn-cancel">Volver sin guardar</a>
    </form>
</div>

</body>
</html>
