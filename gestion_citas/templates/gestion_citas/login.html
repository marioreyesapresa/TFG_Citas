<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Hospital TFG</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #3498db, #8e44ad); /* Fondo moderno */
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }
        .login-card {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 350px;
            text-align: center;
        }
        .login-card h2 { color: #333; margin-bottom: 20px; }
        .logo { font-size: 3em; margin-bottom: 10px; }
        
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box; /* Importante para que no se salga del ancho */
        }
        
        button {
            width: 100%;
            padding: 12px;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1.1em;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover { background-color: #27ae60; }
        
        .error-msg { color: red; font-size: 0.9em; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo">🏥</div>
        <h2>Portal de Salud Prueba</h2>
        
        <form method="post">
            {% csrf_token %}
            
            <input type="text" name="username" placeholder="Usuario" required autofocus>
            <input type="password" name="password" placeholder="Contraseña" required>
            
            <button type="submit">Entrar</button>
            
            {% if form.errors %}
                <p class="error-msg">Usuario o contraseña incorrectos.</p>
            {% endif %}
        </form>

        <p style="margin-top: 20px; color: #777; font-size: 0.8em;">
            TFG Gestión de Citas Médicas
        </p>
    </div>

</body>
</html>
