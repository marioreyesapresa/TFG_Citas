<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Acceso Denegado</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background-color: #f8d7da; }
        .box { background: white; padding: 40px; border-radius: 10px; display: inline-block; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: #721c24; }
        a { display: inline-block; margin-top: 20px; padding: 10px 20px; background: #721c24; color: white; text-decoration: none; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="box">
        <h1>⚠️ Acceso Restringido</h1>
        <p>{{ mensaje }}</p>
        <p>Solo el personal médico autorizado puede ver esta sección.</p>
        
        <br>
        <a href="/admin/logout/">Cerrar Sesión</a>
        <br><br>
        <br><br>
    
        <a href="{% url 'login' %}" style="background: #555; padding: 10px 20px; color: white; text-decoration: none; border-radius: 5px;">Volver al Login</a>
        
        <form action="{% url 'logout' %}" method="post" style="display: inline-block; margin-left: 10px;">
            {% csrf_token %}
            <button type="submit" style="background: #721c24; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 1em;">
                Forzar Cierre de Sesión
            </button>
        </form>
    </div>
</body>
</html>
