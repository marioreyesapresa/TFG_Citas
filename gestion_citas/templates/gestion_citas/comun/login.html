<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Hospital TFG</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-page: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --input-border: #e2e8f0;
            --input-focus: rgba(37, 99, 235, 0.1);
            --radius-lg: 24px;
            --radius-md: 12px;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #eff6ff 0%, #e0f2fe 100%);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }

        .login-card {
            background: var(--card-bg);
            padding: 50px 40px;
            border-radius: var(--radius-lg);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 420px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.8);
            box-sizing: border-box;
        }

        .logo {
            font-size: 3rem;
            color: var(--primary);
            margin-bottom: 20px;
        }

        h2 {
            font-size: 1.75rem;
            margin-bottom: 30px;
            font-weight: 700;
        }

        .alert {
            padding: 12px;
            border-radius: var(--radius-md);
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        .alert-info { background: #eff6ff; color: #1e40af; border: 1px solid #bfdbfe; }
        .alert-error { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }

        .form-group {
            position: relative;
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            z-index: 10;
        }

        .premium-input {
            width: 100% !important;
            height: 54px;
            padding: 12px 16px 12px 48px;
            border: 1px solid var(--input-border);
            border-radius: var(--radius-md);
            font-family: inherit;
            font-size: 1rem;
            background: #fcfdfe;
            transition: all 0.2s ease;
            box-sizing: border-box; /* Fix overflow */
        }

        .premium-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px var(--input-focus);
            background: white;
        }

        .premium-btn {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s;
        }

        .premium-btn:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        }

        .links {
            margin-top: 30px;
            font-size: 0.95rem;
            color: var(--text-muted);
        }

        .links a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .home-link {
            display: inline-block;
            margin-top: 25px;
            color: #94a3b8;
            text-decoration: none;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo"><i class="fas fa-hospital-user"></i></div>
        <h2>Área Privada</h2>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-info">
                    <i class="fas fa-info-circle"></i> {{ message }}
                </div>
            {% endfor %}
        {% endif %}
        
        <form method="post">
            {% csrf_token %}
            
            <div class="form-group">
                <i class="fas fa-user"></i>
                <input type="text" name="username" class="premium-input" placeholder="Usuario" required autofocus>
            </div>

            <div class="form-group">
                <i class="fas fa-lock"></i>
                <input type="password" name="password" class="premium-input" placeholder="Contraseña" required>
            </div>
            
            <button type="submit" class="premium-btn">Iniciar Sesión</button>
            
            {% if form.errors %}
                <div class="alert alert-error" style="margin-top: 15px;">
                    <i class="fas fa-exclamation-circle"></i> Usuario o contraseña incorrectos.
                </div>
            {% endif %}
        </form>

        <div class="links">
            ¿No tienes cuenta? <a href="{% url 'registro' %}">Regístrate ahora</a>
        </div>

        <a href="{% url 'index' %}" class="home-link">
            <i class="fas fa-arrow-left"></i> Volver al inicio
        </a>
    </div>

</body>
</html>
